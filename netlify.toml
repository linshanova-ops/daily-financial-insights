# Root config so Netlify can connect directly to this public GitHub repo.
# Connect at https://app.netlify.com/start → pick linshanova-ops/daily-financial-insights
#
# Required for on-demand "Refresh now":
#   Netlify env GITHUB_PAT = fine-grained PAT with Actions: Read and write on this repo
#   GitHub Actions variable NEXT_PUBLIC_REFRESH_API =
#     https://<your-site>.netlify.app/.netlify/functions/refresh-briefing

[build]
  base = "web"
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
