name: Generate daily briefing

on:
  # Twice daily — 08:00 and 20:00 China Standard Time (UTC+8) = 00:00 and 12:00 UTC.
  # Morning run: prior US cash session + overnight Asia.
  # Evening run: same-day China close (US cash not yet open).
  schedule:
    - cron: "0 0,12 * * *"
  # Manual runs from the Actions tab (no public Refresh button).
  workflow_dispatch:
  # Optional legacy hook (unused by the public site).
  repository_dispatch:
    types: [refresh-briefing]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  # Needed to workflow_dispatch Pages deploy after GITHUB_TOKEN merge
  # (push events from GITHUB_TOKEN do not start other workflows).
  actions: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Check for CURSOR_API_KEY
        id: key
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Add repository secret CURSOR_API_KEY to enable automatic daily briefings."
            echo "Manual publish: open a PR with web/content/briefings/YYYY-MM-DD.md; Briefing accuracy gate must pass."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Cursor SDK
        if: steps.key.outputs.present == 'true'
        run: npm install @cursor/sdk@latest

      - name: Generate briefing PR, wait for CI, auto-merge when green
        if: steps.key.outputs.present == 'true'
        timeout-minutes: 90
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: https://github.com/linshanova-ops/daily-financial-insights
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-daily-briefing.mjs
