name: Generate daily briefing

on:
  # Fire every minute during the Beijing publish windows only:
  #   08:00–08:19 Beijing = 00:00–00:19 UTC
  #   20:00–20:19 Beijing = 12:00–12:19 UTC
  # Dense ticks raise the odds GitHub delivers at least one on-time run.
  # Slot gate still enforces: at/after the hour, max +20m, skip if already published.
  # Optional free external cron (cron-job.org) can also POST repository_dispatch
  # as backup — see docs/PUBLIC_SITE.md (no Netlify cost).
  schedule:
    - cron: "0-19 0 * * *"
    - cron: "0-19 12 * * *"
  # Manual runs from the Actions tab (bypasses slot gate).
  workflow_dispatch:
  # External cron backup / legacy hook.
  # Omit client_payload.force → same Beijing slot gate as schedule.
  # {"event_type":"refresh-briefing","client_payload":{"force":true}} → always run.
  repository_dispatch:
    types: [refresh-briefing]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  # Needed to workflow_dispatch Pages deploy after GITHUB_TOKEN merge
  # (push events from GITHUB_TOKEN do not start other workflows).
  actions: write

# Overlapping schedule/dispatch runs race on briefing/YYYY-MM-DD and can open
# duplicate draft PRs that never get CI. Queue extras; do not cancel an in-flight publish.
concurrency:
  group: generate-daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Beijing 08:00 / 20:00 slot gate
        id: gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISPATCH_FORCE: ${{ github.event.client_payload.force }}
        run: node scripts/briefing-slot-gate.mjs

      - name: Check for CURSOR_API_KEY
        id: key
        if: steps.gate.outputs.should_run == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Add repository secret CURSOR_API_KEY to enable automatic daily briefings."
            echo "Manual publish: open a PR with web/content/briefings/YYYY-MM-DD.md; Briefing accuracy gate must pass."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Cursor SDK
        if: steps.key.outputs.present == 'true'
        run: npm install @cursor/sdk@latest

      - name: Generate briefing PR, wait for CI, auto-merge when green
        if: steps.key.outputs.present == 'true'
        timeout-minutes: 90
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: https://github.com/linshanova-ops/daily-financial-insights
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # From slot gate on schedule; empty on manual → script uses Beijing today.
          BRIEFING_DATE: ${{ steps.gate.outputs.briefing_date }}
        run: node scripts/generate-daily-briefing.mjs
