name: Generate daily briefing

on:
  # Beijing publish windows (GitHub schedule is best-effort):
  #   08:00 Beijing = 00:00 UTC — primary every 5m through +45m
  #   20:00 Beijing = 12:00 UTC — same
  # Missed-slot catch-up: every 30m for 3h after each hour if that slot
  # never published (GitHub has skipped entire dense windows before).
  # Optional free external cron backup — docs/PUBLIC_SITE.md.
  schedule:
    - cron: "0,5,10,15,20,25,30,35,40,45 0 * * *"
    - cron: "0,5,10,15,20,25,30,35,40,45 12 * * *"
    - cron: "0,30 1,2,3 * * *"
    - cron: "0,30 13,14,15 * * *"
  # Manual runs from the Actions tab (bypasses slot gate).
  workflow_dispatch:
  # External cron backup / legacy hook.
  # Omit client_payload.force → same Beijing slot gate as schedule.
  # {"event_type":"refresh-briefing","client_payload":{"force":true}} → always run.
  repository_dispatch:
    types: [refresh-briefing]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  # Needed to workflow_dispatch Pages deploy after GITHUB_TOKEN merge
  # (push events from GITHUB_TOKEN do not start other workflows).
  actions: write

# Overlapping schedule/dispatch runs race on briefing/YYYY-MM-DD and can open
# duplicate draft PRs that never get CI. Queue extras; do not cancel an in-flight publish.
concurrency:
  group: generate-daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Beijing 08:00 / 20:00 slot gate
        id: gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISPATCH_FORCE: ${{ github.event.client_payload.force }}
        run: node scripts/briefing-slot-gate.mjs

      - name: Check for CURSOR_API_KEY
        id: key
        if: steps.gate.outputs.should_run == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Add repository secret CURSOR_API_KEY to enable automatic daily briefings."
            echo "Manual publish: open a PR with web/content/briefings/YYYY-MM-DD.md; Briefing accuracy gate must pass."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install script deps (IMAP + Cursor SDK)
        if: steps.gate.outputs.should_run == 'true' && steps.key.outputs.present == 'true'
        run: |
          npm install @cursor/sdk@latest
          npm install --prefix scripts

      - name: Fetch inbox newsletters (Bloomberg daily + Glassnode weekly)
        if: steps.gate.outputs.should_run == 'true' && steps.key.outputs.present == 'true'
        env:
          INBOX_IMAP_HOST: ${{ secrets.INBOX_IMAP_HOST }}
          INBOX_IMAP_USER: ${{ secrets.INBOX_IMAP_USER }}
          INBOX_IMAP_PASSWORD: ${{ secrets.INBOX_IMAP_PASSWORD }}
          INBOX_IMAP_PORT: ${{ secrets.INBOX_IMAP_PORT }}
          BRIEFING_DATE: ${{ steps.gate.outputs.briefing_date }}
        run: node scripts/fetch-inbox-sources.mjs

      - name: Generate briefing PR, wait for CI, auto-merge when green
        if: steps.gate.outputs.should_run == 'true' && steps.key.outputs.present == 'true'
        timeout-minutes: 90
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: https://github.com/linshanova-ops/daily-financial-insights
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIEFING_DATE: ${{ steps.gate.outputs.briefing_date }}
          BRIEFING_SLOT_ID: ${{ steps.gate.outputs.slot_id }}
        run: node scripts/generate-daily-briefing.mjs
