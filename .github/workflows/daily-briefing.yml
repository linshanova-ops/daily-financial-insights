name: Generate daily briefing

on:
  # GitHub schedule is BEST-EFFORT and has skipped entire publish windows.
  # Strategy:
  #   1) Light primary ticks at :00/:15/:30/:45 of Beijing hours (UTC 0 and 12)
  #   2) Hourly heartbeat at :05 every hour — recovers missed slots for 6h
  #   3) External cron-job.org repository_dispatch (REQUIRED for true on-time)
  #      — see docs/ON_TIME_PUBLISH.md
  schedule:
    - cron: "0,15,30,45 0 * * *"
    - cron: "0,15,30,45 12 * * *"
    - cron: "5 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-briefing]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  actions: write

concurrency:
  group: generate-daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Beijing 08:00 / 20:00 slot gate
        id: gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISPATCH_FORCE: ${{ github.event.client_payload.force }}
        run: node scripts/briefing-slot-gate.mjs

      - name: Check for CURSOR_API_KEY
        id: key
        if: steps.gate.outputs.should_run == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Add repository secret CURSOR_API_KEY to enable automatic daily briefings."
            echo "Manual publish: open a PR with web/content/briefings/YYYY-MM-DD.md; Briefing accuracy gate must pass."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install script deps (IMAP + Cursor SDK)
        if: steps.gate.outputs.should_run == 'true' && steps.key.outputs.present == 'true'
        run: |
          npm install @cursor/sdk@latest
          npm install --prefix scripts

      - name: Fetch inbox newsletters (Bloomberg daily + Glassnode weekly)
        if: steps.gate.outputs.should_run == 'true' && steps.key.outputs.present == 'true'
        env:
          INBOX_IMAP_HOST: ${{ secrets.INBOX_IMAP_HOST }}
          INBOX_IMAP_USER: ${{ secrets.INBOX_IMAP_USER }}
          INBOX_IMAP_PASSWORD: ${{ secrets.INBOX_IMAP_PASSWORD }}
          INBOX_IMAP_PORT: ${{ secrets.INBOX_IMAP_PORT }}
          BRIEFING_DATE: ${{ steps.gate.outputs.briefing_date }}
        run: node scripts/fetch-inbox-sources.mjs

      # Fund module phase 2: live RSS scan on the same Beijing windows.
      # Sources: Hedgeweek + Google News + HedgeCo. No CURSOR_API_KEY required.
      - name: Scan Fund signals (Hedgeweek + Google News)
        id: fund
        if: steps.gate.outputs.should_run == 'true'
        continue-on-error: true
        run: node scripts/scan-fund-signals.mjs --commit

      - name: Deploy Pages after Fund content refresh
        if: steps.gate.outputs.should_run == 'true' && steps.fund.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/dispatches" \
            -f event_type=deploy-pages \
            || echo "::notice::Could not dispatch deploy-pages (Fund commit may still trigger push deploy)."

      - name: Generate briefing PR, wait for CI, auto-merge when green
        if: steps.gate.outputs.should_run == 'true' && steps.key.outputs.present == 'true'
        timeout-minutes: 90
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: https://github.com/linshanova-ops/daily-financial-insights
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIEFING_DATE: ${{ steps.gate.outputs.briefing_date }}
          BRIEFING_SLOT_ID: ${{ steps.gate.outputs.slot_id }}
        run: node scripts/generate-daily-briefing.mjs
