name: Briefing accuracy gate

# Fail-closed gate for Refresh PRs: must pass before auto-merge to main.
on:
  pull_request:
    # Include ready_for_review: Cursor autoCreatePR opens drafts; the
    # orchestrator marks them ready before waiting on CI. Without this event,
    # accuracy CI may never queue after draft → ready.
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "web/content/briefings/**"
      - "web/public/data/**"
      - "web/scripts/scan-source-links.mjs"
      - "web/scripts/rejected-source-ids.json"
      - "web/package.json"
      - "web/package-lock.json"

jobs:
  scan-links:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Verify briefing publish gate (sync JSON + scan-links)
        run: npm run verify-briefing
